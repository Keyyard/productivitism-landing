<section class="section section--darker" id="download" aria-labelledby="download-title">
  <div class="container">
    <div class="download-inner reveal">
      <span class="section-label" style="text-align:center;display:block;" data-text="download.label">Start Today</span>
      <h2 class="section-title" id="download-title" style="text-align:center;" data-text="download.title">BEGIN YOUR QUEST</h2>
      <p class="section-sub" style="text-align:center;margin:0 auto var(--gap-lg);" data-text="download.subtitle">
        Free during Early Access. No credit card required.
      </p>

      <div class="download-badges">

        <a href="#" class="btn btn-store btn-store-lg" aria-label="Download on the App Store" data-href="download.appStoreUrl">
          <img src="assets/icons/apple.png" alt="" class="btn-store-icon" aria-hidden="true" />
          <span class="btn-store-text">
            <span class="btn-store-sub" data-text="download.appStoreText">Download on the</span>
            <span class="btn-store-name">App Store</span>
          </span>
        </a>

        <a href="#" class="btn btn-store btn-store-lg" aria-label="Get it on Google Play" data-href="download.googlePlayUrl">
          <img src="assets/icons/google.png" alt="" class="btn-store-icon" aria-hidden="true" />
          <span class="btn-store-text">
            <span class="btn-store-sub" data-text="download.googlePlayText">Get it on</span>
            <span class="btn-store-name">Google Play</span>
          </span>
        </a>

      </div>

      <p class="download-tagline">
        <span data-text="download.tagline">Free during Early Access</span><span class="blink">_</span>
      </p>
    </div>
  </div>
</section>
