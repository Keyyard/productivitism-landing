<section class="section section--dark" id="screenshots" aria-labelledby="screenshots-title">
  <div class="container">
    <span class="section-label">App Preview</span>
    <h2 class="section-title" id="screenshots-title">SEE IT IN ACTION</h2>
    <p class="section-sub">
      A retro pixel aesthetic that makes productivity feel like an adventure.
    </p>

    <!-- Group tabs -->
    <div class="ss-groups" role="tablist" aria-label="Screenshot groups">
      <button class="ss-group-btn active" data-group="home" role="tab" aria-selected="true" aria-controls="ss-group-home">HOME</button>
      <button class="ss-group-btn" data-group="party" role="tab" aria-selected="false" aria-controls="ss-group-party">PARTY</button>
      <button class="ss-group-btn" data-group="focus" role="tab" aria-selected="false" aria-controls="ss-group-focus">FOCUS</button>
    </div>

    <!-- HOME group -->
    <div class="ss-group-panel active" id="ss-group-home" role="tabpanel" aria-label="Home screenshots">
      <div class="ss-gallery">
        <figure class="ss-featured-frame reveal">
          <div class="ss-featured-img">
            <img src="assets/screenshots/home_tasks.jpg" alt="Home dashboard with task list" />
          </div>
          <figcaption class="ss-featured-caption">DASHBOARD</figcaption>
        </figure>
        <div class="ss-thumbs">
          <figure class="ss-thumb active" data-src="assets/screenshots/home_tasks.jpg" data-caption="DASHBOARD" aria-label="View dashboard screenshot">
            <img src="assets/screenshots/home_tasks.jpg" alt="" loading="lazy" />
            <figcaption>DASHBOARD</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/home_tasks_detail.jpg" data-caption="QUEST DETAIL" aria-label="View quest detail screenshot">
            <img src="assets/screenshots/home_tasks_detail.jpg" alt="" loading="lazy" />
            <figcaption>QUEST DETAIL</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/home_habits.jpg" data-caption="DAILY RITUALS" aria-label="View daily rituals screenshot">
            <img src="assets/screenshots/home_habits.jpg" alt="" loading="lazy" />
            <figcaption>DAILY RITUALS</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/home_voices.jpg" data-caption="VOICE MEMOS" aria-label="View voice memos screenshot">
            <img src="assets/screenshots/home_voices.jpg" alt="" loading="lazy" />
            <figcaption>VOICE MEMOS</figcaption>
          </figure>
        </div>
      </div>
    </div>

    <!-- PARTY group -->
    <div class="ss-group-panel" id="ss-group-party" role="tabpanel" aria-label="Party screenshots">
      <div class="ss-gallery">
        <figure class="ss-featured-frame">
          <div class="ss-featured-img">
            <img src="assets/screenshots/party.jpg" alt="Party screen with characters and activity heatmap" />
          </div>
          <figcaption class="ss-featured-caption">PARTY</figcaption>
        </figure>
        <div class="ss-thumbs">
          <figure class="ss-thumb active" data-src="assets/screenshots/party.jpg" data-caption="PARTY" aria-label="View party screenshot">
            <img src="assets/screenshots/party.jpg" alt="" loading="lazy" />
            <figcaption>PARTY</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/party_character.jpg" data-caption="CHARACTER" aria-label="View character screenshot">
            <img src="assets/screenshots/party_character.jpg" alt="" loading="lazy" />
            <figcaption>CHARACTER</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/party_character_studio.jpg" data-caption="CHARACTER CREATOR" aria-label="View character creator screenshot">
            <img src="assets/screenshots/party_character_studio.jpg" alt="" loading="lazy" />
            <figcaption>CREATOR</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/party_analysis.jpg" data-caption="PARTY STATS" aria-label="View party stats screenshot">
            <img src="assets/screenshots/party_analysis.jpg" alt="" loading="lazy" />
            <figcaption>PARTY STATS</figcaption>
          </figure>
        </div>
      </div>
    </div>

    <!-- FOCUS group -->
    <div class="ss-group-panel" id="ss-group-focus" role="tabpanel" aria-label="Focus screenshots">
      <div class="ss-gallery">
        <figure class="ss-featured-frame">
          <div class="ss-featured-img">
            <img src="assets/screenshots/focus.jpg" alt="Focus timer sanctuary" />
          </div>
          <figcaption class="ss-featured-caption">THE SANCTUARY</figcaption>
        </figure>
        <div class="ss-thumbs">
          <figure class="ss-thumb active" data-src="assets/screenshots/focus.jpg" data-caption="THE SANCTUARY" aria-label="View sanctuary screenshot">
            <img src="assets/screenshots/focus.jpg" alt="" loading="lazy" />
            <figcaption>SANCTUARY</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/focus_sounds.jpg" data-caption="AMBIENCE" aria-label="View ambience screenshot">
            <img src="assets/screenshots/focus_sounds.jpg" alt="" loading="lazy" />
            <figcaption>AMBIENCE</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/focus_analysis.jpg" data-caption="FOCUS STATS" aria-label="View focus stats screenshot">
            <img src="assets/screenshots/focus_analysis.jpg" alt="" loading="lazy" />
            <figcaption>FOCUS STATS</figcaption>
          </figure>
          <figure class="ss-thumb" data-src="assets/screenshots/focus_share.jpg" data-caption="SHARE SESSION" aria-label="View share session screenshot">
            <img src="assets/screenshots/focus_share.jpg" alt="" loading="lazy" />
            <figcaption>SHARE</figcaption>
          </figure>
        </div>
      </div>
    </div>

  </div>
</section>
