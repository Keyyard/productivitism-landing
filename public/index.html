  <noscript>
    <main>
      <h2>Gamified Pixel Productivity App for Multitalented Individuals</h2>
      <p>You're a jack-of-all-trades juggling multiple identities. Create pixel-art characters for each role, turn habits into quests, and escape decision paralysis by focusing on one character at a time. Level up your real life.</p>
      <h2>Build Multiple Identities</h2>
      <p>Stop mixing up your roles. Each character represents a different part of who you are — The Developer, The Athlete, The Creator, The Student. Level them up independently.</p>
      <h3>Daily Rituals</h3>
      <p>Build streaks on habits tied to each character. Every check-in earns XP and moves your character closer to the next level. Three habit types: Check, Count, Measure.</p>
      <h3>Quest Board</h3>
      <p>Frame your goals as quests. Assign tasks to characters, set difficulty ratings (1–10), and earn XP for completion. Subtask breakdowns, voice memos, due dates.</p>
      <h3>Cozy Focus Room</h3>
      <p>Enter deep focus without burnout. Sit your pixel art character in a cozy sanctuary with ambient soundscapes. ADHD-friendly. Pomodoro and endurance modes.</p>
      <h3>Character System</h3>
      <p>Create pixel art avatars for each life role. Customize appearance, unlock cosmetics, and track stat distribution across all roles. 12 class archetypes.</p>
    </main>
  </noscript>
