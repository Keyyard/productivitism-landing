<section class="section section--dark" id="screenshots" aria-labelledby="screenshots-title">
  <div class="container">
    <span class="section-label">App Preview</span>
    <h2 class="section-title" id="screenshots-title">SEE IT IN ACTION</h2>
    <p class="section-sub">
      A retro pixel aesthetic that makes productivity feel like an adventure.
    </p>

    <!-- Group tabs -->
    <div class="ss-groups" role="tablist" aria-label="Screenshot groups">
      <button class="ss-group-btn active" data-group="home" role="tab" aria-selected="true" aria-controls="ss-group-home">HOME</button>
      <button class="ss-group-btn" data-group="party" role="tab" aria-selected="false" aria-controls="ss-group-party">PARTY</button>
      <button class="ss-group-btn" data-group="focus" role="tab" aria-selected="false" aria-controls="ss-group-focus">FOCUS</button>
    </div>

    <!-- HOME group -->
    <div class="ss-group-panel active" id="ss-group-home" role="tabpanel" aria-label="Home screenshots">
      <div class="ss-phone-track">
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/home_tasks.jpg" alt="Home dashboard with task list" loading="lazy" />
          </div>
          <figcaption>DASHBOARD</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/home_tasks_detail.jpg" alt="Quest detail view" loading="lazy" />
          </div>
          <figcaption>QUEST DETAIL</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/home_habits.jpg" alt="Daily rituals habit tracking" loading="lazy" />
          </div>
          <figcaption>DAILY RITUALS</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/home_voices.jpg" alt="Voice memos on tasks" loading="lazy" />
          </div>
          <figcaption>VOICE MEMOS</figcaption>
        </figure>
      </div>
    </div>

    <!-- PARTY group -->
    <div class="ss-group-panel" id="ss-group-party" role="tabpanel" aria-label="Party screenshots">
      <div class="ss-phone-track">
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/party.jpg" alt="Party screen with characters and activity heatmap" loading="lazy" />
          </div>
          <figcaption>PARTY</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/party_character.jpg" alt="Character view" loading="lazy" />
          </div>
          <figcaption>CHARACTER</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/party_character_studio.jpg" alt="Character creator studio" loading="lazy" />
          </div>
          <figcaption>CREATOR</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/party_analysis.jpg" alt="Party stats analysis" loading="lazy" />
          </div>
          <figcaption>PARTY STATS</figcaption>
        </figure>
      </div>
    </div>

    <!-- FOCUS group -->
    <div class="ss-group-panel" id="ss-group-focus" role="tabpanel" aria-label="Focus screenshots">
      <div class="ss-phone-track">
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/focus.jpg" alt="Focus timer sanctuary" loading="lazy" />
          </div>
          <figcaption>SANCTUARY</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/focus_sounds.jpg" alt="Ambient sound selection" loading="lazy" />
          </div>
          <figcaption>AMBIENCE</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/focus_analysis.jpg" alt="Focus session statistics" loading="lazy" />
          </div>
          <figcaption>FOCUS STATS</figcaption>
        </figure>
        <figure class="ss-phone-item">
          <div class="ss-phone-frame">
            <img src="assets/screenshots/focus_share.jpg" alt="Share focus session" loading="lazy" />
          </div>
          <figcaption>SHARE</figcaption>
        </figure>
      </div>
    </div>

  </div>
</section>
